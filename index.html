<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuvaneshwari Charati | Portfolio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>
:root {
    --bg-dark: linear-gradient(135deg,#141e30,#243b55);
    --bg-light: #f4f7fb;
    --text-dark: white;
    --text-light: #111;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-dark);
    color: var(--text-dark);
    transition: 0.4s;
}

.light-mode {
    background: var(--bg-light);
    color: var(--text-light);
}

.glass {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.hero {
    height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

#particles-js {
    position:absolute;
    width:100%;
    height:100%;
    z-index:-1;
}

.profile-img {
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100%{transform:translateY(0);} 
    50%{transform:translateY(-15px);} 
}

.card:hover { transform:scale(1.05); transition:0.3s; }

.toggle-btn {
    position:fixed;
    top:20px;
    right:20px;
}

</style>
</head>
<body>

<button class="btn btn-warning toggle-btn" onclick="toggleMode()">🌙</button>
<div id="particles-js"></div>

<!-- HERO -->
<section class="hero">
<div class="glass animate__animated animate__fadeInDown">
<img src="f_bhavya.jpg" class="profile-img mb-3">
<h1>Bhuvaneshwari Charati</h1>
<h4 id="typing"></h4>
<a href="Bhuvaneshwari_Resume.pdf" download class="btn btn-info mt-3">Download Resume</a>
</div>
</section>

<!-- PROJECTS WITH IMAGES -->
<section class="container my-5">
<h2 class="text-center mb-4">Projects</h2>
<div class="row">
<div class="col-md-4">
<div class="glass">
<img src="project1.png" class="img-fluid rounded mb-2">
<h5>Blogging Website</h5>
</div>
</div>
<div class="col-md-4">
<div class="glass">
<img src="project2.png" class="img-fluid rounded mb-2">
<h5>Campus System</h5>
</div>
</div>
<div class="col-md-4">
<div class="glass">
<img src="project3.png" class="img-fluid rounded mb-2">
<h5>Tableau Dashboard</h5>
</div>
</div>
</div>
</section>

<!-- CONTACT FORM -->
<section class="container my-5">
<div class="glass">
<h2 class="text-center">Contact Me</h2>
<form action="https://formspree.io/f/yourid" method="POST">
<input class="form-control mb-2" type="text" name="name" placeholder="Your Name" required>
<input class="form-control mb-2" type="email" name="email" placeholder="Your Email" required>
<textarea class="form-control mb-2" name="message" placeholder="Message"></textarea>
<button class="btn btn-success w-100">Send</button>
</form>
</div>
</section>

<script>

// DARK MODE
function toggleMode(){
 document.body.classList.toggle('light-mode');
}

// TYPING
const text=["Aspiring Developer","Data Analyst","Problem Solver"];
let i=0,j=0,cur="",del=false;
function type(){
 cur=text[i];
 document.getElementById("typing").innerHTML=cur.substring(0,j);
 if(!del && j<cur.length){j++;setTimeout(type,100);} 
 else if(del && j>0){j--;setTimeout(type,50);} 
 else{del=!del;if(!del)i=(i+1)%text.length;setTimeout(type,800);} }
type();

// PARTICLES
particlesJS("particles-js",{particles:{number:{value:80},size:{value:3}}});

</script>

</body>
</html>
